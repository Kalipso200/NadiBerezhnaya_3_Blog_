[pytest]
# Python path - добавляем корневую директорию
pythonpath = .

# Директория с тестами
testpaths = tests

# Шаблоны для поиска тестовых файлов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Параметры по умолчанию
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
    --maxfail=5
    --capture=no

# Маркеры для тестов
markers =
    slow: тесты, которые выполняются долго (можно пропустить с '-m "not slow"')
    integration: интеграционные тесты
    unit: модульные тесты
    auth: тесты авторизации
    posts: тесты постов
    comments: тесты комментариев
    users: тесты пользователей
    db: тесты с подключением к БД
    api: тесты API эндпоинтов

# Настройки логирования
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Настройки для pytest-asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Настройки для pytest-cov
cov_report = term-missing:skip-covered
cov_fail_under = 50

# Фильтрация предупреждений
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestDeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*cgi.*:DeprecationWarning
    ignore:.*crypt.*:DeprecationWarning

# Настройки для xdist (параллельный запуск)
# n = auto  # автоматически определять количество ядер
# dist = loadscope  # распределение тестов по модулям

# Настройки для повторного запуска упавших тестов
# reruns = 2
# reruns_delay = 1

# Настройки для таймаутов
timeout = 300
timeout_method = thread

# Настройки для JUnit отчетов
junit_family = xunit2
junit_suite_name = Blog API Tests

# Настройки для doctest
doctest_optionflags = NORMALIZE_WHITESPACE IGNORE_EXCEPTION_DETAIL